# Local development stack for Hestia.
# Provides the three backing services the app depends on:
#   - PostgreSQL 16  : source of truth (Prisma target)
#   - Redis 7        : cache, pub/sub for Socket.io, rate limiting, sessions
#   - Meilisearch    : full-text search (integration deferred, infra ready)
#
# This file is for LOCAL DEV ONLY. Production config lives elsewhere and is
# never derived from these defaults. Copy .env.example -> .env before running:
#   docker compose --env-file .env up -d


name: hestia-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hestia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hestia_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-hestia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hestia} -d ${POSTGRES_DB:-hestia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-hestia_dev_master_key}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  meili_data:
